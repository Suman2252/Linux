<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020814"/>
      <stop offset="30%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#020814"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700">
        <animate attributeName="stop-color" values="#FFD700;#FCC624;#FFE066;#FFD700" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#FCC624">
        <animate attributeName="stop-color" values="#FCC624;#FFE066;#FFD700;#FCC624" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FFE066">
        <animate attributeName="stop-color" values="#FFE066;#FFD700;#FCC624;#FFE066" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCC624" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FCC624" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FCC624" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edgeFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FCC624" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FCC624" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FCC624" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCC624" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FCC624" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4EAA25" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4EAA25" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Deep dark background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Subtle grid lines for depth -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="1200" y2="40" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="320" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="320" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="320" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="320" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="320" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="320" stroke="#FCC624" stroke-width="0.5"/>
    <line x1="1100" y1="0" x2="1100" y2="320" stroke="#FCC624" stroke-width="0.5"/>
  </g>

  <!-- Floating mysterious orbs -->
  <circle cx="180" cy="100" r="120" fill="url(#orb1)">
    <animate attributeName="cx" values="180;220;180" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;140;100" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950" cy="200" r="150" fill="url(#orb2)">
    <animate attributeName="cx" values="950;910;950" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;170;200" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="60" r="100" fill="url(#orb3)">
    <animate attributeName="cx" values="600;640;600" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Scanning line effect -->
  <rect x="0" y="-50" width="1200" height="50" fill="url(#scanLine)">
    <animate attributeName="y" values="-50;370" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating code/matrix text - left side -->
  <g font-family="monospace" font-size="11" fill="#4EAA25">
    <text x="30" y="35" opacity="0">chmod 755
      <animate attributeName="opacity" values="0;0.25;0.25;0" dur="8s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="55" y="60" opacity="0">#!/bin/bash
      <animate attributeName="opacity" values="0;0.2;0.2;0" dur="7s" begin="1s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="85" opacity="0">sudo systemctl
      <animate attributeName="opacity" values="0;0.18;0.18;0" dur="9s" begin="2s" repeatCount="indefinite"/>
    </text>
    <text x="40" y="115" opacity="0">cat /proc/cpuinfo
      <animate attributeName="opacity" values="0;0.22;0.22;0" dur="6s" begin="0.5s" repeatCount="indefinite"/>
    </text>
    <text x="15" y="145" opacity="0">iptables -L -n
      <animate attributeName="opacity" values="0;0.15;0.15;0" dur="10s" begin="3s" repeatCount="indefinite"/>
    </text>
    <text x="60" y="175" opacity="0">grep -r "kernel"
      <animate attributeName="opacity" values="0;0.2;0.2;0" dur="7s" begin="1.5s" repeatCount="indefinite"/>
    </text>
    <text x="25" y="210" opacity="0">mount /dev/sda1
      <animate attributeName="opacity" values="0;0.17;0.17;0" dur="8s" begin="4s" repeatCount="indefinite"/>
    </text>
    <text x="50" y="245" opacity="0">journalctl -xe
      <animate attributeName="opacity" values="0;0.2;0.2;0" dur="9s" begin="2.5s" repeatCount="indefinite"/>
    </text>
    <text x="30" y="275" opacity="0">docker compose up
      <animate attributeName="opacity" values="0;0.15;0.15;0" dur="7s" begin="5s" repeatCount="indefinite"/>
    </text>
    <text x="65" y="300" opacity="0">kubectl get pods
      <animate attributeName="opacity" values="0;0.18;0.18;0" dur="8s" begin="3.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Floating code - right side -->
  <g font-family="monospace" font-size="11" fill="#4EAA25" text-anchor="end">
    <text x="1170" y="40" opacity="0">ls -la /etc/
      <animate attributeName="opacity" values="0;0.2;0.2;0" dur="7s" begin="1s" repeatCount="indefinite"/>
    </text>
    <text x="1150" y="70" opacity="0">ssh root@server
      <animate attributeName="opacity" values="0;0.22;0.22;0" dur="9s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="1180" y="100" opacity="0">echo $PATH
      <animate attributeName="opacity" values="0;0.18;0.18;0" dur="6s" begin="2s" repeatCount="indefinite"/>
    </text>
    <text x="1140" y="135" opacity="0">make menuconfig
      <animate attributeName="opacity" values="0;0.15;0.15;0" dur="8s" begin="3s" repeatCount="indefinite"/>
    </text>
    <text x="1165" y="170" opacity="0">strace -p 1337
      <animate attributeName="opacity" values="0;0.2;0.2;0" dur="10s" begin="1.5s" repeatCount="indefinite"/>
    </text>
    <text x="1175" y="205" opacity="0">bpftrace -e '...'
      <animate attributeName="opacity" values="0;0.17;0.17;0" dur="7s" begin="4s" repeatCount="indefinite"/>
    </text>
    <text x="1155" y="240" opacity="0">perf stat -a
      <animate attributeName="opacity" values="0;0.2;0.2;0" dur="9s" begin="2.5s" repeatCount="indefinite"/>
    </text>
    <text x="1170" y="270" opacity="0">nmap -sV target
      <animate attributeName="opacity" values="0;0.15;0.15;0" dur="8s" begin="5s" repeatCount="indefinite"/>
    </text>
    <text x="1145" y="300" opacity="0">vim /etc/fstab
      <animate attributeName="opacity" values="0;0.22;0.22;0" dur="6s" begin="0.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Animated particles / stars -->
  <g fill="#FCC624">
    <circle cx="150" cy="50" r="1.2" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.2;2;1.2" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="30" r="1" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="65" r="1.5" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.5;2.5;1.5" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="25" r="1" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="55" r="1.3" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.3;2.2;1.3" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="40" r="1.1" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="280" r="1" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="3.8s" begin="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="290" r="1.4" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.4;2.3;1.4" dur="2.8s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="285" r="1.2" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="4s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="275" r="1" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="3.2s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="45" r="0.8" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="840" cy="35" r="0.9" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="5s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Subtle green particles -->
  <g fill="#4EAA25">
    <circle cx="250" cy="150" r="0.8" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="6s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="130" r="0.7" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="250" r="0.9" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="7s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="260" r="0.8" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="4s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Terminal prompt in center area -->
  <text x="600" y="90" text-anchor="middle" font-family="monospace" font-size="14" fill="#4EAA25" filter="url(#subtleGlow)" opacity="0.4">
    user@linux:~$
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Blinking cursor after prompt -->
  <rect x="668" y="78" width="8" height="15" fill="#4EAA25" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Penguin emoji as focal element -->
  <text x="600" y="155" text-anchor="middle" font-size="42" opacity="0.9">
    🐧
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Main Title -->
  <text x="600" y="210" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="44" font-weight="bold" fill="url(#titleGrad)" filter="url(#softGlow)">
    The Ultimate Linux Guide
    <animate attributeName="opacity" values="0.85;1;0.85" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Decorative glowing line under title -->
  <line x1="350" y1="225" x2="850" y2="225" stroke="#FCC624" stroke-width="1" opacity="0.3" filter="url(#glow)">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x1" values="380;350;380" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="820;850;820" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- Subtitle -->
  <text x="600" y="255" text-anchor="middle" font-family="monospace" font-size="15" fill="#8b949e" opacity="0.8">
    From Zero to Kernel Hacker  ·  34 Chapters  ·  200+ Commands
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- Horizontal accent lines at edges -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#FCC624" stroke-width="2" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="319" x2="1200" y2="319" stroke="#FCC624" stroke-width="2" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" begin="2s" repeatCount="indefinite"/>
  </line>

  <!-- Corner accents -->
  <g stroke="#FCC624" stroke-width="1.5" fill="none" opacity="0.3">
    <polyline points="0,30 0,0 30,0">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="5s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="1170,0 1200,0 1200,30">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="5s" begin="1.25s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="1200,290 1200,320 1170,320">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="5s" begin="2.5s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="30,320 0,320 0,290">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="5s" begin="3.75s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="295" text-anchor="middle" font-family="monospace" font-size="11" fill="#58a6ff" opacity="0.4">
    ⭐ Star this repo  ·  Open Source  ·  MIT License
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
  </text>
</svg>
